name = "atuin_ai_core"
version = "0.1.0"
licences = ["Apache-2.0"]
target = "erlang"

# The host-agnostic Atuin AI chat engine: domain logic, the turn loop,
# the LLM provider adapters, and the HTTP layer (controller, driver,
# streaming). A deployment composes an `instance.Instance` and serves
# `controller.serve`.
#
# Runtime host requirements beyond hex deps: the `atuin_ai_plug_ffi` /
# `atuin_ai_callers_ffi` Erlang modules call `Elixir.Plug.Conn`, so the
# consuming application must run on Elixir with Plug available.

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
gleam_regexp = ">= 1.0.0 and < 2.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
dream_http_client = { git = "https://github.com/atuinsh/dream_http_client.git", ref = "3.0.1-atuin.3" }
ssevents = ">= 0.14.0 and < 1.0.0"
gleam_yielder = ">= 1.1.0 and < 2.0.0"

[dev-dependencies]
envoy = ">= 1.2.0 and < 2.0.0"
gleeunit = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 2.5.0 and < 3.0.0"
